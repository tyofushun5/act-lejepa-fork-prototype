app: state predictor


# --------------------- Training ---------------------
training_arguments:
  # seed
  seed: 42
  max_steps: 250

  # optimization
  optim: adamw_torch
  lr_scheduler_type: cosine
  warmup_ratio: 0.08
  learning_rate: 6.0e-4
  weight_decay: 0.1

  # dataloader
  per_device_train_batch_size: 512
  per_device_eval_batch_size: 512
  dataloader_num_workers: 16
  dataloader_drop_last: true

  # log training
  logging_strategy: steps
  logging_steps: 250
  logging_first_step: true
  log_on_each_node: false

  # eval_strategy: steps
  # eval_steps: 0.25
  # eval_delay: 1 # skip eval at the beginning
  
  save_strategy: steps
  # save_steps: 1000 # save every n steps (and the last step)

  # other
  gradient_accumulation_steps: 1
  full_determinism: true
  report_to: ['wandb']

normalize_keys: []

callbacks: ['LogAuxiliaryLossCallback']

# --------------------- Features ---------------------
feature_config: &horizon
  observation.image: 1
  observation.state: 30
  episode_index: 1
  task_index: 1
  action: 30


# --------------------- Model ---------------------
model:
  class_name: StatePredictorModel
  horizon: *horizon

  predictor:
    hidden_size: 512
    intermediate_size: 2048
    num_hidden_layers: 4
    num_attention_heads: 8
    hidden_act: relu
    attention_dropout: 0.1
    horizon: *horizon
    causal: true


# --------------------- Metaworld settings ---------------------
dataset:
  repo_ids:
    - alek98/metaworld_button-press-topdown-v3
    - alek98/metaworld_button-press-topdown-wall-v3
    - alek98/metaworld_button-press-v3
    - alek98/metaworld_button-press-wall-v3
    - alek98/metaworld_coffee-button-v3
    - alek98/metaworld_coffee-pull-v3
    - alek98/metaworld_coffee-push-v3
    - alek98/metaworld_drawer-open-v3
    - alek98/metaworld_faucet-close-v3
    - alek98/metaworld_faucet-open-v3
    - alek98/metaworld_disassemble-v3
    - alek98/metaworld_door-close-v3
    - alek98/metaworld_door-open-v3
    - alek98/metaworld_window-close-v3
    - alek98/metaworld_window-open-v3
  revision: 'main'
  use_videos: True
  train_episodes_range: [0, 40]
  test_episodes_range: [40, 50]
