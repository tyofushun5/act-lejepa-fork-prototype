app: act-original crane_x7

# --------------------- Training ---------------------
training_arguments:
  # seed
  seed: 42
  max_steps: 6000

  # optimization
  optim: adamw_torch
  lr_scheduler_type: cosine
  warmup_ratio: 0.04
  learning_rate: 6.0e-4
  weight_decay: 0.1

  # dataloader
  per_device_train_batch_size: 128
  per_device_eval_batch_size: 128
  dataloader_num_workers: 16
  dataloader_persistent_workers: true
  dataloader_drop_last: true

  # log training
  logging_strategy: steps
  logging_steps: 50
  logging_first_step: true
  log_on_each_node: false

  # eval_strategy: steps
  # eval_steps: 0.25
  # eval_delay: 1 # skip eval at the beginning

  save_strategy: steps
  save_steps: 500 # save every n steps (and the last step)

  # other
  gradient_accumulation_steps: 1
  full_determinism: true
  report_to: ['wandb']

normalize_keys: ['action', 'observation.state']

callbacks: ['AgentEvaluatorCallback', 'LogAuxiliaryLossCallback']

# --------------------- Features ---------------------
feature_config: &horizon
  observation.image: 1
  observation.state: 1
  episode_index: 1
  task_index: 1
  action: 30


# --------------------- Policy model ---------------------
model:
  policy_name: ActionChunkingPolicy
  class_name: ActModel
  horizon: *horizon

  encoder: &common_params
    hidden_size: 512
    intermediate_size: 2048
    num_hidden_layers: 4
    num_attention_heads: 8
    hidden_act: relu
    attention_dropout: 0.1
    horizon: *horizon

  decoder:
    <<: *common_params
    num_hidden_layers: 1
    causal: false


# --------------------- CRANE-X7 settings ---------------------
dataset:
  repo_ids:
    - local/crane_x7_lift
  revision: 'main'
  use_videos: True
  train_episodes_range: [0, 100]
  test_episodes_range: [100, 120]

env:
  rollout_steps: 500
  rollout_delay: 1 # skip rollout at the beginning

  num_episodes: 20
  # Used by training-time rollouts for checkpoint selection.
  seed: 1000
  # Used only by the standalone final evaluation runner.
  final_eval_seed: 2000

  env_kwargs:
    id: CraneX7-v0
    img_size: 128
    max_episode_steps: 300
    success_height: 0.170

  env_names:
    - lift-cube

  eval_camera_views:
    - right
    - left
    - front

state_predictor: !inc state_predictor.yaml
state_predictor_every_n_steps: 1000
