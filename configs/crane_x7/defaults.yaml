environment:
  img_size: 128
  cube_size: 0.030
  cube_color: [1.0, 1.0, 0.0]
  cube_friction: 2.0
  cube_margin: 0.03
  success_height: null
  dt: 0.0025
  substeps: 40
  device: cpu
  show_viewer: true
  # Genesis VisOptions.show_cameras; draws camera bodies/frustums in the viewer.
  show_cameras: false
  # Genesis VisOptions.plane_reflection; works with the rasterized viewer/cameras.
  plane_reflection: true
  rigid_options:
    enable_self_collision: false
    iterations: 400
    tolerance: 1.0e-8
    ls_iterations: 120
    noslip_iterations: 10
    constraint_timeconst: 0.005
    contact_pruning_tolerance: null
    max_collision_pairs: 512
    use_gjk_collision: true
  # camera_view choices:
  #   right: current/default observation view from the manipulator's right side
  #   left: mirrored view from the manipulator's left side
  #   front: front view centered on the manipulator
  camera_view: right

  camera_views:
    right:
      pos: [1.0, 1.0, 0.10]
      lookat: [0.200, 0.0, 0.10]
      fov: 30.0
    left:
      pos: [1.0, -1.0, 0.10]
      lookat: [0.200, 0.0, 0.10]
      fov: 30.0
    front:
      pos: [1.0, 0.0, 0.10]
      lookat: [0.200, 0.0, 0.10]
      fov: 30.0

robot:
  gripper_open: 0.9
  gripper_close: 0.0
  gripper_force_limit: 0.9
  gripper_kp: 2.75
  gripper_kv: 0.275
  arm_kp: [3520, 3520, 2640, 2640, 1760, 1760, 1760]
  arm_kv: [352, 352, 264, 264, 176, 176, 176]
  max_ik_joint_step: 0.10
  max_gripper_joint_step: 0.05
  urdf:
    decimate: false
    convexify: true
    decompose_robot_error_threshold: 0.0
  coacd:
    threshold: 0.05
    max_convex_hull: -1
    preprocess_resolution: 40
    resolution: 1500
    mcts_iterations: 120
    mcts_max_depth: 4

collection:
  repo_id: local/crane_x7_lift
  num_episodes: 120
  max_steps: 300
  seed: 0
  z_hover: 0.20
  z_grasp: null
  grasp_ee_clearance: 0.065
  z_lift: 0.28
  expert_step_size: 0.010
  reach_tol: 0.02
  grasp_steps: 20
  pregrasp: 0.45
  settle_steps: 20
  keep_failures: false
  max_attempts_factor: 3
