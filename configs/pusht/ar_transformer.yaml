app: autoregressive transformer pusht

# --------------------- Training ---------------------
training_arguments:
  # seed
  seed: 42
  max_steps: 4000

  # optimization
  optim: adamw_torch
  lr_scheduler_type: cosine
  warmup_ratio: 0.04
  learning_rate: 6.0e-4
  weight_decay: 0.1

  # dataloader
  per_device_train_batch_size: 128
  per_device_eval_batch_size: 128
  dataloader_num_workers: 16
  dataloader_drop_last: true

  # log training
  logging_strategy: steps
  logging_steps: 50
  logging_first_step: true
  log_on_each_node: false

  # eval_strategy: steps
  # eval_steps: 0.25
  # eval_delay: 1 # skip eval at the beginning
  
  save_strategy: steps
  save_steps: 1000 # save every n steps (and the last step)

  # other
  gradient_accumulation_steps: 1
  report_to: ['wandb']

normalize_keys: ['action', 'observation.state']

callbacks: ['AgentEvaluatorCallback', 'LogAuxiliaryLossCallback']

# --------------------- Features ---------------------
feature_config: &horizon
  observation.image: 15
  observation.state: 1
  episode_index: 1
  task_index: 1
  action: 15


# --------------------- Policy model ---------------------
model:
  policy_name: ARTransformerPolicy
  class_name: ARTransformerModel
  horizon: *horizon

  backbone_hidden_size: 32
  hidden_size: 512
  intermediate_size: 2048
  num_hidden_layers: 5
  num_attention_heads: 8
  hidden_act: relu
  attention_dropout: 0.1
  causal: true

# --------------------- PushT settings ---------------------
dataset:
  repo_ids:
    - alek98/pusht
  revision: 'main'
  use_videos: True
  train_episodes_range: [0, 190]
  test_episodes_range: [190, 206]

env:
  rollout_steps: 1000
  rollout_delay: 1 # skip rollout at the beginning

  num_episodes: 100
  seed: 1000
  
  env_kwargs:
    id: my-pusht-v0
    img_size: 96
    max_episode_steps: 300

  env_names:
    - none

state_predictor: !inc state_predictor.yaml
state_predictor_every_n_steps: 1000
